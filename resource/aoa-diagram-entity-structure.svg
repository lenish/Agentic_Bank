<svg width="1000" height="760" viewBox="0 0 1000 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0" y1="0" x2="0" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F8FAFC"/>
    </linearGradient>
    <filter id="softShadow" x="0" y="0" width="1000" height="760" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
    <style>
      .title { font: 700 34px Inter, -apple-system, sans-serif; fill: #0F172A; }
      .box-title-dark { font: 700 28px Inter, -apple-system, sans-serif; fill: #FFFFFF; }
      .box-subtitle-dark { font: 500 16px Inter, -apple-system, sans-serif; fill: #CBD5E1; }
      .box-title-main { font: 700 30px Inter, -apple-system, sans-serif; fill: #0F172A; }
      .box-subtitle-main { font: 500 17px Inter, -apple-system, sans-serif; fill: #334155; }
      .pill-text { font: 600 14px Inter, -apple-system, sans-serif; fill: #0E7490; }
      .label-text { font: 600 13px Inter, -apple-system, sans-serif; fill: #0F172A; }
      .reg-title { font: 700 24px Inter, -apple-system, sans-serif; fill: #0F172A; }
      .reg-subtitle { font: 600 16px Inter, -apple-system, sans-serif; fill: #0E7490; }
      .out-text { font: 700 20px Inter, -apple-system, sans-serif; fill: #1E293B; }
    </style>
  </defs>

  <rect width="1000" height="760" fill="url(#bgGradient)"/>

  <text x="500" y="64" text-anchor="middle" class="title">Joint Venture Entity Structure</text>

  <g filter="url(#softShadow)">
