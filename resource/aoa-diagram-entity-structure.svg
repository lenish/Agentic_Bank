    <text x="275" y="160" text-anchor="middle" class="box-title-dark">SC Ventures</text>
    <text x="275" y="193" text-anchor="middle" class="box-subtitle-dark">Banking - Regulatory - Distribution</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="560" y="110" width="330" height="118" rx="14" fill="#0F172A"/>
    <text x="725" y="160" text-anchor="middle" class="box-title-dark">Hashed</text>
    <text x="725" y="193" text-anchor="middle" class="box-subtitle-dark">Blockchain - Crypto Ecosystem - Web3</text>
  </g>

  <path d="M275 228V274H500" stroke="#64748B" stroke-width="3"/>
  <path d="M725 228V274H500" stroke="#64748B" stroke-width="3"/>
  <path d="M500 274V302" stroke="#64748B" stroke-width="3"/>

