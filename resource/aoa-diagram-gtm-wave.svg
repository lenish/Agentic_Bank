<svg width="1000" height="700" viewBox="0 0 1000 700" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="canvasBg" x1="0" y1="0" x2="0" y2="700" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F8FAFC"/>
    </linearGradient>
    <filter id="cardShadow" x="0" y="0" width="1000" height="700" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0F172A" flood-opacity="0.1"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0 0L10 4L0 8V0Z" fill="#64748B"/>
    </marker>
    <style>
      .title { font: 700 34px Inter, -apple-system, sans-serif; fill: #0F172A; }
      .progress-label { font: 600 14px Inter, -apple-system, sans-serif; fill: #1E293B; }
      .progress-value { font: 700 14px Inter, -apple-system, sans-serif; fill: #0E7490; }
      .wave-title-light { font: 700 22px Inter, -apple-system, sans-serif; fill: #FFFFFF; }
      .wave-title-dark { font: 700 22px Inter, -apple-system, sans-serif; fill: #0F172A; }
      .time-light { font: 600 14px Inter, -apple-system, sans-serif; fill: #A5F3FC; }
      .time-dark { font: 600 14px Inter, -apple-system, sans-serif; fill: #134E4A; }
      .item-light { font: 500 14px Inter, -apple-system, sans-serif; fill: #E2E8F0; }
      .item-dark { font: 600 14px Inter, -apple-system, sans-serif; fill: #083344; }
      .wave-chip { font: 700 12px Inter, -apple-system, sans-serif; fill: #0F172A; }
    </style>
  </defs>

  <rect width="1000" height="700" fill="url(#canvasBg)"/>

  <text x="500" y="66" text-anchor="middle" class="title">Go-to-Market: 4-Wave Strategy</text>

  <rect x="80" y="98" width="840" height="14" rx="7" fill="#E2E8F0"/>
  <rect x="80" y="98" width="630" height="14" rx="7" fill="#2DD4BF"/>
  <text x="80" y="88" class="progress-label">Execution Progress</text>
  <text x="920" y="88" text-anchor="end" class="progress-value">75% Complete</text>

  <path d="M260 430H280" stroke="#64748B" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  <path d="M490 380H510" stroke="#64748B" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  <path d="M720 330H740" stroke="#64748B" stroke-width="2.5" marker-end="url(#arrowhead)"/>

  <g filter="url(#cardShadow)">
    <rect x="50" y="320" width="210" height="250" rx="16" fill="#0F172A"/>
    <rect x="66" y="336" width="74" height="24" rx="12" fill="#2DD4BF"/>
    <text x="103" y="353" text-anchor="middle" class="wave-chip">WAVE 1</text>
    <text x="68" y="387" class="wave-title-light">Singapore Launch</text>
    <text x="68" y="412" class="time-light">Months 0-6</text>

    <circle cx="74" cy="440" r="3" fill="#2DD4BF"/>
    <text x="86" y="445" class="item-light">MAS Sandbox Entry</text>
    <circle cx="74" cy="470" r="3" fill="#2DD4BF"/>
    <text x="86" y="475" class="item-light">SGD + USDC Dual Rail</text>
    <circle cx="74" cy="500" r="3" fill="#2DD4BF"/>
    <text x="86" y="505" class="item-light">3 Pilot Customers</text>
  </g>

  <g filter="url(#cardShadow)">
    <rect x="280" y="270" width="210" height="250" rx="16" fill="#1E293B"/>
    <rect x="296" y="286" width="74" height="24" rx="12" fill="#2DD4BF"/>
    <text x="333" y="303" text-anchor="middle" class="wave-chip">WAVE 2</text>
    <text x="298" y="337" class="wave-title-light">Pan-Asia Expansion</text>
    <text x="298" y="362" class="time-light">Months 7-12</text>

    <circle cx="304" cy="390" r="3" fill="#2DD4BF"/>
    <text x="316" y="395" class="item-light">HK (HKMA) + UAE (VARA)</text>
    <circle cx="304" cy="420" r="3" fill="#2DD4BF"/>
    <text x="316" y="425" class="item-light">Multi-currency AOA</text>
    <circle cx="304" cy="450" r="3" fill="#2DD4BF"/>
    <text x="316" y="455" class="item-light">Cross-border Stablecoin</text>
  </g>

  <g filter="url(#cardShadow)">
    <rect x="510" y="220" width="210" height="250" rx="16" fill="#0E7490"/>
    <rect x="526" y="236" width="74" height="24" rx="12" fill="#99F6E4"/>
    <text x="563" y="253" text-anchor="middle" class="wave-chip">WAVE 3</text>
    <text x="528" y="287" class="wave-title-light">Product Maturity</text>
    <text x="528" y="312" class="time-light">Months 13-18</text>

    <circle cx="534" cy="340" r="3" fill="#A7F3D0"/>
    <text x="546" y="345" class="item-light">Advanced Policy Engine</text>
    <circle cx="534" cy="370" r="3" fill="#A7F3D0"/>
    <text x="546" y="375" class="item-light">Graph-based Risk</text>
    <circle cx="534" cy="400" r="3" fill="#A7F3D0"/>
    <text x="546" y="405" class="item-light">Agent-to-Agent Settlement</text>
  </g>

  <g filter="url(#cardShadow)">
    <rect x="740" y="170" width="210" height="250" rx="16" fill="#2DD4BF"/>
    <rect x="756" y="186" width="74" height="24" rx="12" fill="#CCFBF1"/>
    <text x="793" y="203" text-anchor="middle" class="wave-chip">WAVE 4</text>
    <text x="758" y="237" class="wave-title-dark">Series A and Scale</text>
    <text x="758" y="262" class="time-dark">Month 19+</text>

    <circle cx="764" cy="290" r="3" fill="#0F172A"/>
    <text x="776" y="295" class="item-dark">Venture Independence</text>
    <circle cx="764" cy="320" r="3" fill="#0F172A"/>
    <text x="776" y="325" class="item-dark">Series A Funding</text>
    <circle cx="764" cy="350" r="3" fill="#0F172A"/>
    <text x="776" y="355" class="item-dark">Global Expansion</text>
  </g>
</svg>
